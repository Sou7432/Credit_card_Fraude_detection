<!doctype html>
<html>
  <head>
    <title>Prediction Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --coral: #FF5F57;
        --yellow: #FFD23F;
        --teal: #3ECFCF;
        --purple: #A259FF;
        --lime: #B5FF4D;
        --dark: #0E0E12;
        --card-bg: #1A1A24;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        min-height: 100vh;
        background-color: var(--dark);
        font-family: 'DM Sans', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      /* Animated blobs */
      .blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.25;
        animation: drift 10s ease-in-out infinite alternate;
        pointer-events: none;
        z-index: 0;
      }
      .blob-1 { width: 420px; height: 420px; background: var(--coral); top: -100px; left: -100px; animation-delay: 0s; }
      .blob-2 { width: 360px; height: 360px; background: var(--teal); bottom: -80px; right: -80px; animation-delay: -3s; }
      .blob-3 { width: 280px; height: 280px; background: var(--purple); top: 50%; left: 60%; animation-delay: -6s; }

      @keyframes drift {
        from { transform: translate(0, 0) scale(1); }
        to   { transform: translate(30px, 20px) scale(1.08); }
      }

      /* Card */
      .card {
        position: relative;
        z-index: 1;
        background: var(--card-bg);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 28px;
        padding: 56px 64px;
        max-width: 540px;
        width: 90vw;
        text-align: center;
        box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes rise {
        from { opacity: 0; transform: translateY(36px) scale(0.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

      /* Greeting */
      .greeting {
        display: inline-block;
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--yellow);
        background: rgba(255, 210, 63, 0.12);
        border: 1px solid rgba(255, 210, 63, 0.3);
        border-radius: 999px;
        padding: 5px 16px;
        margin-bottom: 28px;
        animation: rise 0.7s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* Heading */
      h2 {
        font-family: 'Syne', sans-serif;
        font-size: 1.05rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.45);
        margin-bottom: 16px;
        animation: rise 0.7s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* Result */
      h1 {
        font-family: 'Syne', sans-serif;
        font-size: clamp(2.6rem, 7vw, 4rem);
        font-weight: 800;
        line-height: 1.1;
        margin-bottom: 40px;
        background: linear-gradient(135deg, var(--teal) 0%, var(--lime) 50%, var(--yellow) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: rise 0.7s 0.22s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* Divider */
      .divider {
        width: 60px;
        height: 3px;
        background: linear-gradient(90deg, var(--coral), var(--purple));
        border-radius: 999px;
        margin: 0 auto 40px;
        animation: rise 0.7s 0.28s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      /* Link */
      a {
        display: inline-block;
        text-decoration: none;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--dark);
        background: linear-gradient(135deg, var(--coral), var(--yellow));
        border-radius: 14px;
        padding: 14px 36px;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
        box-shadow: 0 6px 24px rgba(255, 95, 87, 0.35);
        animation: rise 0.7s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      a:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 12px 36px rgba(255, 95, 87, 0.5);
      }

      a:active {
        transform: translateY(0) scale(0.98);
      }
    </style>
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="card">
      <span class="greeting">Hi there 👋</span>
      <h2>Prediction Result</h2>
      <div class="divider"></div>
      <h1>{{result}}</h1>
      <a href="/">↩ Try Another Transaction</a>
    </div>
  </body>
</html>
